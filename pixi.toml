[workspace]
name = "deep-hedger"
version = "0.1.0"
description = "Modular deep hedging MVP scaffold"
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

[feature.cpu.dependencies]
python = "3.12.*"
numpy = { version = "*", channel = "conda-forge" }
scipy = { version = "*", channel = "conda-forge" }
pandas = { version = "*", channel = "conda-forge" }
rich = { version = "*", channel = "conda-forge" }
pytorch = { version = "*", channel = "pytorch" }

[feature.cuda.dependencies]
python = "3.12.*"
numpy = { version = "*", channel = "conda-forge" }
scipy = { version = "*", channel = "conda-forge" }
pandas = { version = "*", channel = "conda-forge" }
rich = { version = "*", channel = "conda-forge" }
pytorch = { version = "*", channel = "pytorch" }

[feature.cuda.target.linux-64.dependencies]
pytorch-cuda = { version = "12.4.*", channel = "pytorch" }

[environments]
default = { features = ["cpu"], solve-group = "cpu" }
cpu = { features = ["cpu"], solve-group = "cpu" }
cuda = { features = ["cuda"], solve-group = "cuda" }
